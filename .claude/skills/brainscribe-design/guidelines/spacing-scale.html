<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="8px base grid — calm, generous rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); padding: 24px 26px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--accent); border-radius: var(--radius-xs); width: 100%; }
  .box { width: 30px; display: flex; flex-direction: column; align-items: center; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .v { font-size: 10px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="box"><div class="bar" style="height: 4px;"></div><div class="n">1</div><div class="v">4</div></div>
    <div class="box"><div class="bar" style="height: 8px;"></div><div class="n">2</div><div class="v">8</div></div>
    <div class="box"><div class="bar" style="height: 12px;"></div><div class="n">3</div><div class="v">12</div></div>
    <div class="box"><div class="bar" style="height: 16px;"></div><div class="n">4</div><div class="v">16</div></div>
    <div class="box"><div class="bar" style="height: 24px;"></div><div class="n">5</div><div class="v">24</div></div>
    <div class="box"><div class="bar" style="height: 32px;"></div><div class="n">6</div><div class="v">32</div></div>
    <div class="box"><div class="bar" style="height: 40px;"></div><div class="n">7</div><div class="v">40</div></div>
    <div class="box"><div class="bar" style="height: 48px;"></div><div class="n">8</div><div class="v">48</div></div>
    <div class="box"><div class="bar" style="height: 64px;"></div><div class="n">9</div><div class="v">64</div></div>
    <div class="box"><div class="bar" style="height: 80px;"></div><div class="n">10</div><div class="v">80</div></div>
  </div>
</body>
</html>
