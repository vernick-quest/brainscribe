<!-- @dsCard group="Colors" viewport="700x140" name="Navy scale" subtitle="Headings, structure, trust — 50→900" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:22px;}
  .scale{display:flex;gap:8px;}
  .chip{flex:1;border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-xs);}
  .chip .blk{height:64px;}
  .chip .lbl{padding:7px 8px;background:var(--surface-card);}
  .chip .n{font-weight:var(--fw-bold);font-size:var(--text-xs);color:var(--text-strong);}
  .chip .h{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
</style></head><body>
  <div class="scale">
    <div class="chip"><div class="blk" style="background:#EEF4F9;"></div><div class="lbl"><div class="n">50</div><div class="h">#EEF4F9</div></div></div>
    <div class="chip"><div class="blk" style="background:#E0EBF4;"></div><div class="lbl"><div class="n">100</div><div class="h">#E0EBF4</div></div></div>
    <div class="chip"><div class="blk" style="background:#C2D6E8;"></div><div class="lbl"><div class="n">200</div><div class="h">#C2D6E8</div></div></div>
    <div class="chip"><div class="blk" style="background:#9CBBD7;"></div><div class="lbl"><div class="n">300</div><div class="h">#9CBBD7</div></div></div>
    <div class="chip"><div class="blk" style="background:#6E97BD;"></div><div class="lbl"><div class="n">400</div><div class="h">#6E97BD</div></div></div>
    <div class="chip"><div class="blk" style="background:#3E78A8;"></div><div class="lbl"><div class="n">500</div><div class="h">#3E78A8</div></div></div>
    <div class="chip"><div class="blk" style="background:#2A6191;"></div><div class="lbl"><div class="n">600</div><div class="h">#2A6191</div></div></div>
    <div class="chip"><div class="blk" style="background:#1D4D78;"></div><div class="lbl"><div class="n">700</div><div class="h">#1D4D78</div></div></div>
    <div class="chip"><div class="blk" style="background:#14385A;"></div><div class="lbl"><div class="n">800</div><div class="h">#14385A</div></div></div>
    <div class="chip"><div class="blk" style="background:#0E2942;"></div><div class="lbl"><div class="n">900</div><div class="h">#0E2942</div></div></div>
  </div>
</body></html>
