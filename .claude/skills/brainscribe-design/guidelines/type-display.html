<!-- @dsCard group="Type" viewport="700x230" name="Display — Bricolage Grotesque" subtitle="Headings & hero. Warm, modern, a little expressive." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); padding: 24px 26px; color: var(--text-strong); }
  .eyebrow { font: var(--type-meta); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--accent); margin-bottom: 6px; }
  .d1 { font-family: var(--font-display); font-weight: var(--fw-extra); font-size: var(--text-3xl); line-height: var(--leading-tight); letter-spacing: var(--tracking-tight); margin: 0 0 6px; }
  .d2 { font-family: var(--font-display); font-weight: var(--fw-bold); font-size: var(--text-xl); margin: 0 0 4px; }
  .meta { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="eyebrow">Display</div>
  <h1 class="d1">Think it. Say it. Write it.</h1>
  <h2 class="d2">What's the strongest reason you believe that?</h2>
  <div class="meta">Bricolage Grotesque · 800 / 700 · tracking −0.02em</div>
</body>
</html>
