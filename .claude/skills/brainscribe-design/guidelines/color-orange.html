<!-- @dsCard group="Colors" viewport="700x140" name="Orange scale" subtitle="Voice, spark, CTAs — the lightbulb" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:22px;}
  .scale{display:flex;gap:8px;}
  .chip{flex:1;border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-xs);}
  .chip .blk{height:64px;}
  .chip .lbl{padding:7px 8px;background:var(--surface-card);}
  .chip .n{font-weight:var(--fw-bold);font-size:var(--text-xs);color:var(--text-strong);}
  .chip .h{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
</style></head><body>
  <div class="scale">
    <div class="chip"><div class="blk" style="background:#FEF6EC;"></div><div class="lbl"><div class="n">50</div><div class="h">#FEF6EC</div></div></div>
    <div class="chip"><div class="blk" style="background:#FCEAD0;"></div><div class="lbl"><div class="n">100</div><div class="h">#FCEAD0</div></div></div>
    <div class="chip"><div class="blk" style="background:#FBD9A6;"></div><div class="lbl"><div class="n">200</div><div class="h">#FBD9A6</div></div></div>
    <div class="chip"><div class="blk" style="background:#FBB85A;"></div><div class="lbl"><div class="n">300</div><div class="h">#FBB85A</div></div></div>
    <div class="chip"><div class="blk" style="background:#F89A2E;"></div><div class="lbl"><div class="n">400</div><div class="h">#F89A2E</div></div></div>
    <div class="chip"><div class="blk" style="background:#F0811E;"></div><div class="lbl"><div class="n">500</div><div class="h">#F0811E</div></div></div>
    <div class="chip"><div class="blk" style="background:#E0710F;"></div><div class="lbl"><div class="n">600</div><div class="h">#E0710F</div></div></div>
    <div class="chip"><div class="blk" style="background:#C25E0C;"></div><div class="lbl"><div class="n">700</div><div class="h">#C25E0C</div></div></div>
    <div class="chip"><div class="blk" style="background:#9A4A0C;"></div><div class="lbl"><div class="n">800</div><div class="h">#9A4A0C</div></div></div>
  </div>
</body></html>
