<!-- @dsCard group="Colors" viewport="700x180" name="Tutor personas" subtitle="Six coaching styles, each with its own accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); padding: 22px 18px; }
  .row { display: flex; gap: 8px; }
  .t { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .av { width: 48px; height: 48px; border-radius: var(--radius-pill); display: flex; align-items: center; justify-content: center; color: #fff; font-family: var(--font-display); font-weight: var(--fw-bold); font-size: var(--text-base); box-shadow: var(--shadow-sm); }
  .nm { font-weight: var(--fw-bold); font-size: var(--text-sm); color: var(--text-strong); }
  .st { font-size: 10.5px; color: var(--text-muted); text-align: center; line-height: 1.3; }
  .h { font-family: var(--font-mono); font-size: 9px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="t"><div class="av" style="background: var(--tutor-sage);">S</div><div class="nm">Sage</div><div class="st">Methodical<br>calm</div><div class="h">#2A6191</div></div>
    <div class="t"><div class="av" style="background: var(--tutor-spark);">Z</div><div class="nm">Zip</div><div class="st">Energetic<br>brisk</div><div class="h">#F0811E</div></div>
    <div class="t"><div class="av" style="background: var(--tutor-coach);">C</div><div class="nm">Coach</div><div class="st">Steady<br>cheering</div><div class="h">#2E9E6B</div></div>
    <div class="t"><div class="av" style="background: var(--tutor-muse);">M</div><div class="nm">Muse</div><div class="st">Imaginative<br>playful</div><div class="h">#8A5BC2</div></div>
    <div class="t"><div class="av" style="background: var(--tutor-quill);">Q</div><div class="nm">Quill</div><div class="st">Curious<br>precise</div><div class="h">#1F9FA6</div></div>
    <div class="t"><div class="av" style="background: var(--tutor-nova);">N</div><div class="nm">Nova</div><div class="st">Bold<br>expressive</div><div class="h">#DB5A87</div></div>
  </div>
</body>
</html>
