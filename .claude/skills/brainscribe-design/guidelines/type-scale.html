<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="From hero display down to meta captions" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); padding: 22px 26px; color: var(--text-strong); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--cream-300); }
  .r:last-child { border-bottom: 0; }
  .s { font-family: var(--font-display); font-weight: var(--fw-bold); line-height: 1.05; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 130px; text-align: right; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="r"><span class="s" style="font-size: var(--text-3xl);">Aa Display</span><span class="tok">--text-3xl · 48</span></div>
  <div class="r"><span class="s" style="font-size: var(--text-2xl);">Aa Page title</span><span class="tok">--text-2xl · 36</span></div>
  <div class="r"><span class="s" style="font-size: var(--text-xl);">Aa Section head</span><span class="tok">--text-xl · 28</span></div>
  <div class="r"><span class="s" style="font-size: var(--text-lg);">Aa Card title</span><span class="tok">--text-lg · 22</span></div>
  <div class="r"><span class="s" style="font-size: var(--text-md); font-weight: var(--fw-regular); font-family: var(--font-sans);">Aa Lead / chat</span><span class="tok">--text-md · 18</span></div>
  <div class="r"><span class="s" style="font-size: var(--text-base); font-weight: var(--fw-regular); font-family: var(--font-sans);">Aa Body</span><span class="tok">--text-base · 16</span></div>
  <div class="r"><span class="s" style="font-size: var(--text-sm); font-weight: var(--fw-medium); font-family: var(--font-sans);">Aa UI label</span><span class="tok">--text-sm · 14</span></div>
</body>
</html>
