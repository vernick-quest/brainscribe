<!-- @dsCard group="Colors" viewport="700x140" name="Ink / text" subtitle="Warm near-blacks for body copy" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:22px;}
  .scale{display:flex;gap:8px;}
  .chip{flex:1;border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-xs);}
  .chip .blk{height:64px;}
  .chip .lbl{padding:7px 8px;background:var(--surface-card);}
  .chip .n{font-weight:var(--fw-bold);font-size:var(--text-xs);color:var(--text-strong);}
  .chip .h{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
</style></head><body>
  <div class="scale">
    <div class="chip"><div class="blk" style="background:#211D17;"></div><div class="lbl"><div class="n">900</div><div class="h">#211D17</div></div></div>
    <div class="chip"><div class="blk" style="background:#4A4439;"></div><div class="lbl"><div class="n">700</div><div class="h">#4A4439</div></div></div>
    <div class="chip"><div class="blk" style="background:#6B6353;"></div><div class="lbl"><div class="n">600</div><div class="h">#6B6353</div></div></div>
    <div class="chip"><div class="blk" style="background:#8C8474;"></div><div class="lbl"><div class="n">500</div><div class="h">#8C8474</div></div></div>
    <div class="chip"><div class="blk" style="background:#B2A994;"></div><div class="lbl"><div class="n">400</div><div class="h">#B2A994</div></div></div>
    <div class="chip"><div class="blk" style="background:#D6CFBE;"></div><div class="lbl"><div class="n">300</div><div class="h">#D6CFBE</div></div></div>
  </div>
</body></html>
