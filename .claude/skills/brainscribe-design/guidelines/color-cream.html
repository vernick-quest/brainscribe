<!-- @dsCard group="Colors" viewport="700x140" name="Cream / paper" subtitle="Page & surface neutrals (warm)" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:22px;}
  .scale{display:flex;gap:8px;}
  .chip{flex:1;border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-xs);}
  .chip .blk{height:64px;}
  .chip .lbl{padding:7px 8px;background:var(--surface-card);}
  .chip .n{font-weight:var(--fw-bold);font-size:var(--text-xs);color:var(--text-strong);}
  .chip .h{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
</style></head><body>
  <div class="scale">
    <div class="chip"><div class="blk" style="background:#FFFEF9;"></div><div class="lbl"><div class="n">50</div><div class="h">#FFFEF9</div></div></div>
    <div class="chip"><div class="blk" style="background:#FDFBF3;"></div><div class="lbl"><div class="n">100</div><div class="h">#FDFBF3</div></div></div>
    <div class="chip"><div class="blk" style="background:#F8F3E8;"></div><div class="lbl"><div class="n">200</div><div class="h">#F8F3E8</div></div></div>
    <div class="chip"><div class="blk" style="background:#F1EADB;"></div><div class="lbl"><div class="n">300</div><div class="h">#F1EADB</div></div></div>
    <div class="chip"><div class="blk" style="background:#E7DECB;"></div><div class="lbl"><div class="n">400</div><div class="h">#E7DECB</div></div></div>
  </div>
</body></html>
