<!-- @dsCard group="Type" viewport="700x250" name="Body & UI — Plus Jakarta Sans" subtitle="Reading copy, chat, and interface labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); padding: 24px 26px; color: var(--text-body); }
  .lead { font: var(--type-lead); margin: 0 0 10px; max-width: 52ch; }
  .body { font: var(--type-body); color: var(--text-body); margin: 0 0 12px; max-width: 56ch; }
  .ui { display: flex; gap: 10px; align-items: center; }
  .pill { font: var(--type-ui); background: var(--surface-muted); border-radius: var(--radius-pill); padding: 5px 12px; color: var(--text-strong); }
  .label { font: var(--type-meta); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--text-muted); }
</style>
</head>
<body>
  <p class="lead">You shared a really clear opinion just now. Let's find one piece of evidence that backs it up.</p>
  <p class="body">BrainScribe never writes for you — it asks the questions that help you find your own words, then tidies up what you said out loud into a paragraph you approve.</p>
  <div class="ui">
    <span class="label">UI</span>
    <span class="pill">Add to essay</span>
    <span class="pill">Edit</span>
    <span class="pill">Tap to speak</span>
  </div>
</body>
</html>
