<!-- @dsCard group="Spacing" viewport="700x180" name="Corner radii" subtitle="Soft & friendly — nothing sharp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); padding: 22px 26px; }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .sq { width: 100%; height: 72px; background: var(--surface-card); border: 1.5px solid var(--border-accent); box-shadow: var(--shadow-sm); }
  .n { font-weight: var(--fw-bold); font-size: var(--text-xs); color: var(--text-strong); }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="sq" style="border-radius: var(--radius-xs);"></div><div class="n">xs</div><div class="v">6px</div></div>
    <div class="col"><div class="sq" style="border-radius: var(--radius-sm);"></div><div class="n">sm</div><div class="v">10px</div></div>
    <div class="col"><div class="sq" style="border-radius: var(--radius-md);"></div><div class="n">md</div><div class="v">14px</div></div>
    <div class="col"><div class="sq" style="border-radius: var(--radius-lg);"></div><div class="n">lg</div><div class="v">20px</div></div>
    <div class="col"><div class="sq" style="border-radius: var(--radius-xl);"></div><div class="n">xl</div><div class="v">28px</div></div>
    <div class="col"><div class="sq" style="border-radius: var(--radius-pill);"></div><div class="n">pill</div><div class="v">999px</div></div>
  </div>
</body>
</html>
