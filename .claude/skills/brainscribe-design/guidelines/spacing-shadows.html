<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation & shadows" subtitle="Warm navy-tinted lift + the orange spark glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); padding: 26px; }
  .row { display: flex; gap: 22px; align-items: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; flex: 1; }
  .sq { width: 100%; height: 70px; background: var(--surface-card); border-radius: var(--radius-md); }
  .spark { background: var(--accent); }
  .n { font-weight: var(--fw-bold); font-size: var(--text-xs); color: var(--text-strong); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="sq" style="box-shadow: var(--shadow-xs);"></div><div class="n">xs</div></div>
    <div class="col"><div class="sq" style="box-shadow: var(--shadow-sm);"></div><div class="n">sm</div></div>
    <div class="col"><div class="sq" style="box-shadow: var(--shadow-md);"></div><div class="n">md</div></div>
    <div class="col"><div class="sq" style="box-shadow: var(--shadow-lg);"></div><div class="n">lg</div></div>
    <div class="col"><div class="sq spark" style="box-shadow: var(--shadow-spark);"></div><div class="n">spark</div></div>
  </div>
</body>
</html>
